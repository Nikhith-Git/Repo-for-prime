<!DOCTYPE html>
<html>
<head>
    <title>Minecraft Mod Search</title>
    <style>
        body{
            font-family: sans-serif;
            margin:20px;
        }

        #result{
            display:flex;
            flex-wrap:wrap;
            gap:15px;
            margin-top:20px;
        }

        .card{
            width:250px;
            border:1px solid black;
            padding:10px;
        }

        img{
            width:60px;
            height:60px;
        }
    </style>
</head>
<body>

<h2>Minecraft Mod Search</h2>

<input type="text" id="searchBox" placeholder="Enter mod name">
<button id="btn">Search</button>

<div id="result"></div>

<script>

document.getElementById("btn").addEventListener("click", getMods);

async function getMods(){

    let text = document.getElementById("searchBox").value;

    if(text==""){
        alert("Enter a mod name");
        return;
    }

    let response = await fetch(
        "https://api.modrinth.com/v2/search?query="+text
    );

    let data = await response.json();

    let output = "";

    for(let i=0;i<data.hits.length;i++){

        output += `
        <div class="card">
            <img src="${data.hits[i].icon_url}">
            <h3>${data.hits[i].title}</h3>
            <p>${data.hits[i].description}</p>
            <a href="https://modrinth.com/mod/${data.hits[i].slug}" target="_blank">
                Open
            </a>
        </div>
        `;
    }

    document.getElementById("result").innerHTML = output;
}

</script>

</body>
</html>
